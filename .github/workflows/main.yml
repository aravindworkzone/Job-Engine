name: Source + Verify Jobs (Stage 2 → 3)

# 3x/week, 04:00 UTC = 09:30 IST (Mon/Wed/Fri). Stage 2 (source → jobs.json) and
# Stage 3 (verify) chain back-to-back because neither touches Notion. Stage 4
# (push to Notion) is intentionally NOT here — run it manually after reviewing.
on:
  schedule:
    - cron: "0 4 * * 1,3,5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # data/ is ephemeral on CI. jobs.json + careerPages.json are the source of
      # truth and MUST persist across runs, or dedup/verify state resets every time.
      # This cache is best-effort; for guaranteed persistence, commit these two
      # files back to the repo at the end of the run instead (see commented step).
      - name: Restore jobs.json state
        uses: actions/cache@v4
        with:
          path: data
          key: jobs-data-${{ github.run_id }}
          restore-keys: |
            jobs-data-

      - run: npm ci

      # Stage 2 builds its query from data/enriched.json, falling back to
      # data/profile.json. data/ is gitignored (personal data), so provide the
      # profile via the PROFILE_JSON_B64 secret: locally run
      #   base64 -w0 data/profile.json   (macOS: base64 -i data/profile.json)
      # and store the output as a repo secret. The cache-restored copy (if any)
      # is left untouched when the secret is unset.
      - name: Materialize profile.json from secret
        env:
          PROFILE_JSON_B64: ${{ secrets.PROFILE_JSON_B64 }}
        run: |
          if [ -n "$PROFILE_JSON_B64" ]; then
            mkdir -p data
            echo "$PROFILE_JSON_B64" | base64 -d > data/profile.json
            echo "data/profile.json materialized from secret"
          elif [ -f data/profile.json ]; then
            echo "using cache-restored data/profile.json"
          else
            echo "::warning::no profile.json available — Stage 2 will fail; set the PROFILE_JSON_B64 secret"
          fi

      # No NOTION_TOKEN here — by design, the cron (Stages 2–3) never touches
      # Notion. Notion is read once in Stage 1 and written once in Stage 4 (manual).
      - name: Stage 2 → Stage 3
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          CAREERJET_AFFID: ${{ secrets.CAREERJET_AFFID }}
          JSEARCH_RAPIDAPI_KEY: ${{ secrets.JSEARCH_RAPIDAPI_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ALLJOBS_ACTOR_ID: ${{ secrets.APIFY_ALLJOBS_ACTOR_ID }}
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TZ: Asia/Kolkata
        run: npm run cron

      # For reliable cross-run persistence, uncomment to commit state back:
      # - name: Persist jobs.json
      #   run: |
      #     git config user.name "github-actions"
      #     git config user.email "actions@github.com"
      #     git add -f data/jobs.json data/careerPages.json
      #     git commit -m "chore: update jobs.json [skip ci]" || echo "no changes"
      #     git push
